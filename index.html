<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ListenUp - English Learning for Slow Learners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark1: '#080616',
                        dark2: '#1A1953',
                        dark3: '#162E93',
                        dark4: '#2F2FE4',
                        accent: '#2F2FE4',
                    },
                    fontFamily: {
                        heading: ['Baloo 2', 'cursive'],
                        body: ['Comic Neue', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 8D Design System - Dark Mode for Slow Learners */
        * { font-family: 'Comic Neue', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-heading { font-family: 'Baloo 2', cursive; }
        
        /* D1: Deep Background */
        body {
            background: linear-gradient(180deg, #080616 0%, #1A1953 50%, #0a0a1a 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        /* D2: Surface Cards */
        .dark-card {
            background: rgba(26, 25, 83, 0.7);
            border-radius: 24px;
            border: 1px solid rgba(47, 47, 228, 0.2);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        
        /* D3: Accessible Buttons */
        .dark-btn {
            background: linear-gradient(145deg, #2F2FE4, #162E93);
            border-radius: 20px;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 
                0 4px 15px rgba(47, 47, 228, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        
        .dark-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 8px 25px rgba(47, 47, 228, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        /* D4: Huge Play Button */
        .play-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2F2FE4, #162E93);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 40px rgba(47, 47, 228, 0.5),
                0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 
                0 0 60px rgba(47, 47, 228, 0.7),
                0 12px 40px rgba(0, 0, 0, 0.6);
        }
        
        /* D5: Progress Bar */
        .progress-track {
            background: rgba(47, 47, 228, 0.15);
            border-radius: 999px;
            height: 12px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #2F2FE4, #4f4fffa);
            height: 100%;
            border-radius: 999px;
            transition: width 0.1s linear;
        }
        
        /* D6: Speed Buttons */
        .speed-btn {
            width: 60px;
            height: 50px;
            border-radius: 14px;
            background: rgba(22, 46, 147, 0.5);
            border: 1px solid rgba(47, 47, 228, 0.3);
            color: #a0a0ff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .speed-btn.active {
            background: #2F2FE4;
            color: white;
            border-color: #4f4fff;
            box-shadow: 0 0 20px rgba(47, 47, 228, 0.5);
        }
        
        /* D7: Lesson Cards */
        .lesson-card {
            background: rgba(26, 25, 83, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(47, 47, 228, 0.15);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .lesson-card:hover {
            background: rgba(47, 47, 228, 0.2);
            border-color: #2F2FE4;
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(47, 47, 228, 0.3);
        }
        
        /* D8: Text High Contrast */
        .text-bright { color: #ffffff; }
        .text-dim { color: #a0a0ff; }
        .text-muted { color: #6b6bff; }
        
        /* Input styling */
        .dark-input {
            background: rgba(8, 6, 22, 0.8);
            border: 1px solid rgba(47, 47, 228, 0.3);
            border-radius: 14px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
        }
        
        .dark-input:focus {
            outline: none;
            border-color: #2F2FE4;
            box-shadow: 0 0 15px rgba(47, 47, 228, 0.3);
        }
        
        /* Tab Navigation */
        .nav-tab {
            padding: 12px 28px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #a0a0ff;
        }
        
        .nav-tab.active {
            background: #2F2FE4;
            color: white;
            box-shadow: 0 0 20px rgba(47, 47, 228, 0.5);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080616; }
        ::-webkit-scrollbar-thumb { background: #2F2FE4; border-radius: 4px; }
        
        @media (max-width: 768px) {
            .play-btn { width: 100px; height: 100px; }
            .play-btn svg { width: 40px; height: 40px; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 dark-card !rounded-b-3xl mx-4 mt-4">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-dark4 to-dark3 flex items-center justify-center">
                    <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="font-heading text-2xl font-bold text-white">ListenUp</h1>
                    <p class="text-xs text-muted">For Slow Learners</p>
                </div>
            </div>
            <nav class="flex gap-2">
                <button onclick="showSection('library')" class="nav-tab" id="nav-library">Library</button>
                <button onclick="showSection('player')" class="nav-tab" id="nav-player">Player</button>
                <button onclick="showSection('progress')" class="nav-tab" id="nav-progress">Progress</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-32 pb-12 px-6 max-w-5xl mx-auto">
        
        <!-- Library Section -->
        <section id="section-library">
            <div class="text-center mb-10">
                <h2 class="font-heading text-4xl font-bold text-white mb-3">English Listening</h2>
                <p class="text-xl text-dim">Learn at your own pace • Slow Learner Friendly</p>
            </div>
            
            <!-- Category Tabs -->
            <div class="flex flex-wrap justify-center gap-3 mb-8">
                <button onclick="filterCategory('all')" class="nav-tab bg-dark2" data-category="all">All</button>
                <button onclick="filterCategory('beginner')" class="nav-tab bg-dark2" data-category="beginner">Beginner</button>
                <button onclick="filterCategory('intermediate')" class="nav-tab bg-dark2" data-category="intermediate">Intermediate</button>
                <button onclick="filterCategory('advanced')" class="nav-tab bg-dark2" data-category="advanced">Advanced</button>
            </div>
            
            <!-- Search -->
            <div class="max-w-xl mx-auto mb-10">
                <input type="text" id="search-input" placeholder="Search lessons..." 
                    class="dark-input w-full text-lg"
                    oninput="searchLessons(this.value)">
            </div>
            
            <!-- Lessons Grid -->
            <div id="lessons-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Lessons injected here -->
            </div>
        </section>

        <!-- Player Section -->
        <section id="section-player" class="hidden">
            <!-- Now Playing -->
            <div class="dark-card p-8 mb-8">
                <div class="flex flex-col md:flex-row items-center gap-8">
                    <!-- Big Icon -->
                    <div class="w-40 h-40 md:w-56 md:h-56 rounded-3xl bg-gradient-to-br from-dark4 to-dark3 flex items-center justify-center flex-shrink-0 shadow-lg">
                        <svg class="w-20 h-20 md:w-28 md:h-28 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                    <!-- Info -->
                    <div class="text-center md:text-left flex-1">
                        <div class="flex gap-3 justify-center md:justify-start mb-4">
                            <span id="player-level" class="px-4 py-1.5 bg-dark3 rounded-full text-sm font-semibold text-white">Beginner</span>
                        </div>
                        <h2 id="player-title" class="font-heading text-3xl md:text-4xl font-bold text-white mb-3">Select a lesson</h2>
                        <p id="player-description" class="text-lg text-dim">Choose from the library</p>
                    </div>
                </div>
            </div>
            
            <!-- Audio Player -->
            <div class="dark-card p-8 mb-8">
                <!-- Progress -->
                <div class="mb-6">
                    <div class="progress-track cursor-pointer" id="progress-container" onclick="seekAudio(event)">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between text-sm text-muted mt-3 font-medium">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                    </div>
                </div>
                
                <!-- Controls -->
                <div class="flex items-center justify-center gap-6 mb-8">
                    <button onclick="skipBackward()" class="w-16 h-16 rounded-full bg-dark2 flex items-center justify-center hover:bg-dark3 transition">
                        <svg class="w-8 h-8 text-dim" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M11.5 12.5V6 13h1v5.5l4-3.5V19h1v-9l-4-3.5v3.5z"/>
                        </svg>
                    </button>
                    
                    <button onclick="togglePlay()" class="play-btn" id="play-btn">
                        <svg class="w-16 h-16 text-white" fill="currentColor" viewBox="0 0 24 24" id="play-icon">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="w-16 h-16 text-white hidden" fill="currentColor" viewBox="0 0 24 24" id="pause-icon">
                            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                        </svg>
                    </button>
                    
                    <button onclick="skipForward()" class="w-16 h-16 rounded-full bg-dark2 flex items-center justify-center hover:bg-dark3 transition">
                        <svg class="w-8 h-8 text-dim" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12.5 12.5V18h-1v-2.5l-4 3.5V5h1v9l4-3.5v2.5z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Speed -->
                <div class="flex items-center justify-center gap-3 mb-6">
                    <span class="text-muted font-semibold mr-2">Speed:</span>
                    <button onclick="setSpeed(0.5)" class="speed-btn" data-speed="0.5">0.5x</button>
                    <button onclick="setSpeed(0.75)" class="speed-btn" data-speed="0.75">0.75x</button>
                    <button onclick="setSpeed(1)" class="speed-btn active" data-speed="1">1x</button>
                    <button onclick="setSpeed(1.25)" class="speed-btn" data-speed="1.25">1.25x</button>
                    <button onclick="setSpeed(1.5)" class="speed-btn" data-speed="1.5">1.5x</button>
                </div>
                
                <!-- Loop -->
                <div class="flex items-center justify-center gap-4">
                    <button onclick="setLoopStart()" class="dark-btn px-5 py-3 text-sm">
                        Set A: <span id="loop-start-time" class="text-white">--</span>
                    </button>
                    <button onclick="setLoopEnd()" class="dark-btn px-5 py-3 text-sm">
                        Set B: <span id="loop-end-time" class="text-white">--</span>
                    </button>
                    <button onclick="clearLoop()" class="px-5 py-3 rounded-xl bg-red-900/50 text-red-300 hover:bg-red-900 transition">Clear</button>
                    <button onclick="toggleLoop()" class="dark-btn px-5 py-3 text-sm">
                        Loop: <span id="loop-status" class="text-white">OFF</span>
                    </button>
                </div>
            </div>
            
            <!-- Transcript -->
            <div class="dark-card p-8">
                <h3 class="font-heading text-2xl font-bold text-white mb-4">Transcript</h3>
                <div id="transcript-container" class="max-h-64 overflow-y-auto p-5 bg-dark1 rounded-xl">
                    <p id="transcript-text" class="text-lg leading-relaxed text-dim">
                        Select a lesson to see the transcript.
                    </p>
                </div>
            </div>
        </section>

        <!-- Progress Section -->
        <section id="section-progress" class="hidden">
            <div class="dark-card p-8 mb-8">
                <h2 class="font-heading text-3xl font-bold text-white mb-6">Your Progress</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="text-center p-6 bg-dark2 rounded-2xl">
                        <div id="total-listened" class="font-heading text-4xl font-bold text-dark4">0</div>
                        <div class="text-sm text-muted mt-1">Lessons</div>
                    </div>
                    <div class="text-center p-6 bg-dark2 rounded-2xl">
                        <div id="total-time-listened" class="font-heading text-4xl font-bold text-dark4">0m</div>
                        <div class="text-sm text-muted mt-1">Minutes</div>
                    </div>
                    <div class="text-center p-6 bg-dark2 rounded-2xl">
                        <div id="current-streak" class="font-heading text-4xl font-bold text-dark4">0</div>
                        <div class="text-sm text-muted mt-1">Day Streak</div>
                    </div>
                    <div class="text-center p-6 bg-dark2 rounded-2xl">
                        <div id="completed-lessons" class="font-heading text-4xl font-bold text-dark4">0</div>
                        <div class="text-sm text-muted mt-1">Completed</div>
                    </div>
                </div>
            </div>
            
            <div class="text-center">
                <button onclick="clearProgress()" class="px-8 py-4 rounded-xl bg-red-900/50 text-red-300 hover:bg-red-900 transition text-lg font-semibold">Clear All Progress</button>
            </div>
        </section>
    </main>

    <!-- Hidden Audio -->
    <audio id="audio-player" preload="metadata"></audio>

    <script>
        // Sample Lessons - English Only, Slow Learner Focused
        const defaultLessons = [
            { id: 1, title: "Basic Greetings", description: "Learn common English greetings", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Hello! Welcome to our first English lesson. Today we will learn basic greetings. Hello! How are you? I am fine, thank you." },
            { id: 2, title: "Common Phrases", description: "Essential phrases for daily use", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "In this lesson, we learn common English phrases. Please and thank you. Excuse me. I am sorry. Can you help me?" },
            { id: 3, title: "Numbers 1-10", description: "Learn to count in English", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "One, Two, Three, Four, Five. Six, Seven, Eight, Nine, Ten. Let us count together." },
            { id: 4, title: "Family Words", description: "Mother, Father, Brother, Sister", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Mother. Father. Brother. Sister. Grandmother. Grandfather. These are our family members." },
            { id: 5, title: "Colors and Shapes", description: "Red, Blue, Circle, Square", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Red, Blue, Green, Yellow. These are colors. Circle, Square, Triangle. These are shapes." },
            { id: 6, title: "Days of Week", description: "Monday to Sunday", category: "beginner", difficulty: "beginner", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Monday, Tuesday, Wednesday. Thursday, Friday, Saturday, Sunday. These are the days of the week." },
            { id: 7, title: "Simple Questions", description: "What, Where, Who", category: "intermediate", difficulty: "intermediate", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "What is your name? Where do you live? Who is your friend? These are simple questions in English." },
            { id: 8, title: "Job Interview Basics", description: "Prepare for your first interview", category: "intermediate", difficulty: "intermediate", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Tell me about yourself. What are your strengths? What is your weakness? Where do you see yourself in five years?" },
            { id: 9, title: "Business English", description: "Professional communication", category: "advanced", difficulty: "advanced", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "I would like to schedule a meeting. Please find the attached document. Let me follow up on this matter." },
            { id: 10, title: "Academic Writing", description: "Essay writing for college", category: "advanced", difficulty: "advanced", url: "https://www.learningcontainer.com/wp-content/uploads/2020/02/audio.mp3", transcript: "Academic writing requires formal structure. Introduction, body, conclusion. Citation and references are essential." },
        ];

        // State
        let lessons = JSON.parse(localStorage.getItem('listenup_lessons')) || defaultLessons;
        let currentLesson = null;
        let isPlaying = false;
        let currentSpeed = 1;
        let loopStartTime = null;
        let loopEndTime = null;
        let isLooping = false;
        let progress = JSON.parse(localStorage.getItem('listenup_progress')) || { lessons: [], totalMinutes: 0, streaks: 0, lastDate: null };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderLessons();
            updateProgressDisplay();
        });

        function saveLessons() {
            localStorage.setItem('listenup_lessons', JSON.stringify(lessons));
        }

        function renderLessons(filtered = lessons) {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = filtered.map(lesson => `
                <div class="lesson-card" onclick="playLesson(${lesson.id})">
                    <div class="flex items-start gap-4">
                        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-dark4 to-dark3 flex items-center justify-center flex-shrink-0">
                            <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <span class="inline-block px-3 py-1 bg-dark3 rounded-full text-xs text-white mb-2">${lesson.difficulty}</span>
                            <h3 class="font-heading font-bold text-white text-lg">${lesson.title}</h3>
                            <p class="text-sm text-dim mt-1">${lesson.description}</p>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p class="text-center text-dim col-span-2 py-12">No lessons found</p>';
            }
        }

        function filterCategory(cat) {
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === cat);
            });
            const filtered = cat === 'all' ? lessons : lessons.filter(l => l.difficulty === cat || l.category === cat);
            renderLessons(filtered);
        }

        function searchLessons(query) {
            const q = query.toLowerCase();
            const filtered = lessons.filter(l => l.title.toLowerCase().includes(q) || l.description.toLowerCase().includes(q));
            renderLessons(filtered);
        }

        function showSection(section) {
            ['library', 'player', 'progress'].forEach(s => {
                document.getElementById(`section-${s}`).classList.toggle('hidden', s !== section);
                document.getElementById(`nav-${s}`)?.classList.toggle('active', s === section);
            });
            if (section === 'progress') updateProgressDisplay();
        }

        function playLesson(id) {
            const lesson = lessons.find(l => l.id === id);
            if (!lesson) return;
            
            currentLesson = lesson;
            document.getElementById('player-title').textContent = lesson.title;
            document.getElementById('player-description').textContent = lesson.description;
            document.getElementById('player-level').textContent = lesson.difficulty;
            document.getElementById('transcript-text').textContent = lesson.transcript || 'No transcript available.';
            
            const audio = document.getElementById('audio-player');
            audio.src = lesson.url;
            audio.playbackRate = currentSpeed;
            
            showSection('player');
            
            if (!progress.lessons.includes(lesson.id)) {
                progress.lessons.push(lesson.id);
                progress.totalMinutes += 5;
                localStorage.setItem('listenup_progress', JSON.stringify(progress));
            }
        }

        function togglePlay() {
            const audio = document.getElementById('audio-player');
            const playIcon = document.getElementById('play-icon');
            const pauseIcon = document.getElementById('pause-icon');
            
            if (isPlaying) {
                audio.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            } else {
                if (currentLesson) audio.play().catch(e => console.log('Play error:', e));
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            }
            isPlaying = !isPlaying;
        }

        function setSpeed(speed) {
            currentSpeed = speed;
            document.getElementById('audio-player').playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.speed == speed);
            });
        }

        function seekAudio(event) {
            const audio = document.getElementById('audio-player');
            const container = document.getElementById('progress-container');
            const rect = container.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        function skipBackward() {
            const audio = document.getElementById('audio-player');
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        }

        function skipForward() {
            const audio = document.getElementById('audio-player');
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        }

        function setLoopStart() {
            loopStartTime = document.getElementById('audio-player').currentTime;
            document.getElementById('loop-start-time').textContent = formatTime(loopStartTime);
        }

        function setLoopEnd() {
            loopEndTime = document.getElementById('audio-player').currentTime;
            document.getElementById('loop-end-time').textContent = formatTime(loopEndTime);
        }

        function toggleLoop() {
            isLooping = !isLooping;
            document.getElementById('loop-status').textContent = isLooping ? 'ON' : 'OFF';
        }

        function clearLoop() {
            loopStartTime = null;
            loopEndTime = null;
            isLooping = false;
            document.getElementById('loop-start-time').textContent = '--';
            document.getElementById('loop-end-time').textContent = '--';
            document.getElementById('loop-status').textContent = 'OFF';
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgressDisplay() {
            document.getElementById('total-listened').textContent = progress.lessons.length;
            document.getElementById('total-time-listened').textContent = progress.totalMinutes + 'm';
            document.getElementById('current-streak').textContent = progress.streaks;
            document.getElementById('completed-lessons').textContent = progress.lessons.length;
        }

        function clearProgress() {
            if (confirm('Clear all progress?')) {
                progress = { lessons: [], totalMinutes: 0, streaks: 0, lastDate: null };
                localStorage.setItem('listenup_progress', JSON.stringify(progress));
                updateProgressDisplay();
                renderLessons();
            }
        }

        // Audio events
        const audio = document.getElementById('audio-player');
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
            
            if (isLooping && loopStartTime !== null && loopEndTime !== null) {
                if (audio.currentTime >= loopEndTime) {
                    audio.currentTime = loopStartTime;
                }
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            document.getElementById('total-time').textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            isPlaying = false;
            document.getElementById('play-icon').classList.remove('hidden');
            document.getElementById('pause-icon').classList.add('hidden');
        });
    </script>
</body>
</html>
